<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ESSENTIALS COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="description" content="Discover the essentials of life: Human, Air, Water, Food, and Shelter. Explore our collection and learn about the fundamentals of existence.">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: #fff;
        }
        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex: 1;
            position: relative;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            width: 250px;
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }
        .card img {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.5);
        }
        .card h2 {
            margin: 10px 0;
            font-size: 1.5rem;
        }
        .card p {
            color: black;
        }
        .human-card {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: #000;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.8);
            animation: thunder 1.5s infinite;
        }
        .human-card img {
            border-color: gold;
        }
        .air-card {
            background: #446e84;
            color: #fff;
        }
        .water-card {
            background: #3baca8;
            color: #fff;
        }
        .food-card {
            background: #8B4513;
            color: #fff;
        }
        .shelter-card {
            background: #1a241b;
            color: #fff;
        }
        @keyframes thunder {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(255, 215, 0, 0.8);
            }
            50% {
                box-shadow: 0 4px 25px rgba(255, 215, 0, 1);
            }
        }
        footer {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            padding: 10px;
            margin-top: auto;
            position: sticky;
            bottom: 0;
            width: 100%;
        }
        .population-counter {
            text-align: center;
            margin: 40px 0;
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
        }
        a {
            color: #4caf50;
            text-decoration: none;
            font-weight: bold;
        }
        .social-icons {
            margin-top: 10px;
        }
        .social-icons img {
            width: 30px;
            height: 30px;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>THE ESSENTIALS COLLECTION</h1>
        <p id="greeting"></p>
    </header>
    <div class="container">
        <div class="card human-card">
            <img src="stick-figure1.png" alt="Stick figure representing a human">
            <h2>$Human</h2>
            <p>Contract: Coming Soon</p>
        </div>
        <div class="card air-card">
            <img src="air-icon.webp" alt="Icon representing air">
            <h2>$Air</h2>
            <p>Contract: Coming Soon</p>
        </div>
        <div class="card water-card">
            <img src="water-icon.webp" alt="Icon representing water">
            <h2>$Water</h2>
            <p>Contract: Coming Soon</p>
        </div>
        <div class="card food-card">
            <img src="food-icon.webp" alt="Icon representing food">
            <h2>$Food</h2>
            <p>Contract: Coming Soon</p>
        </div>
        <div class="card shelter-card">
            <img src="shelter-icon.jpg" alt="Icon representing shelter">
            <h2>$Shelter</h2>
            <p>Contract: Coming Soon</p>
        </div>
    </div>
    <div class="population-counter">
        Current World Population: <span id="population">Loading...</span>
    </div>
    <footer>
        <p>&copy; 2024 THE ESSENTIALS COLLECTION. All Rights Reserved.</p>
        <div class="social-icons">
            <a href="https://telegram.org" target="_blank"><img src="telegram-icon.png" alt="Telegram"></a>
            <a href="https://x.com" target="_blank"><img src="twitter-icon.png" alt="X"></a>
        </div>
    </footer>
    <script>
        // Dynamic Greeting Based on Time of Day
        const greeting = document.getElementById('greeting');
        const hour = new Date().getHours();
        const items = ['$Human', '$Air', '$Water', '$Food', '$Shelter'];
        const randomItem = items[Math.floor(Math.random() * items.length)];
        if (hour < 12) {
            greeting.textContent = `Good Morning! Discover the essentials of ${randomItem}.`;
        } else if (hour < 18) {
            greeting.textContent = `Good Afternoon! Explore our ${randomItem} collection.`;
        } else {
            greeting.textContent = `Good Evening! Learn about the essentials of ${randomItem}.`;
        }

        // World Population Counter
        const populationElement = document.getElementById('population');

        async function updatePopulation() {
            try {
                const response = await fetch('https://get-population.p.rapidapi.com/population/country?country=Egypt', {
                    method: 'GET',
                    headers: {
                        'X-RapidAPI-Key': 'ce8663fc72mshdb833658877f0a2p1f52e3jsn880ffb4e6554',
                        'X-RapidAPI-Host': 'get-population.p.rapidapi.com'
                    }
                });
                const data = await response.json();
                populationElement.textContent = data.body.world_population.toLocaleString();
            } catch (error) {
                populationElement.textContent = 'Unavailable';
            }
        }

        updatePopulation();
    </script>
</body>
</html>
